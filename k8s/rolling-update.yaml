apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-app
  namespace: aceest
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: aceest
  template:
    metadata:
      labels:
        app: aceest
        version: v1
    spec:
      containers:
        - name: aceest-app
          image: vikashmahala/aceest-app:latest
          ports:
            - containerPort: 5000