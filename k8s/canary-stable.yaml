apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-stable
  namespace: aceest
spec:
  replicas: 4
  selector:
    matchLabels:
      app: aceest
      release: stable
  template:
    metadata:
      labels:
        app: aceest
        release: stable
    spec:
      containers:
        - name: aceest
          image: vikashmahala/aceest-app:v1.0
          ports:
            - containerPort: 5000