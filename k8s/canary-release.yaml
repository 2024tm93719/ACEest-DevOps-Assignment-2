apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-canary
  namespace: aceest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest
      release: canary
  template:
    metadata:
      labels:
        app: aceest
        release: canary
    spec:
      containers:
        - name: aceest
          image: vikashmahala/aceest-app:v1.1
          ports:
            - containerPort: 5000