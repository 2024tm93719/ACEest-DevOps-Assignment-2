apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-green
  namespace: aceest
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest
      track: green
  template:
    metadata:
      labels:
        app: aceest
        track: green
    spec:
      containers:
        - name: aceest
          image: vikashmahala/aceest-app:v1.1
          ports:
            - containerPort: 5000